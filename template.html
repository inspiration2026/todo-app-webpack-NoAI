<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Title</title>
</head>
<body>
    <nav class="sidebar">
        <div class="heading">
            <h1>ToDo List</h1>
        </div>
        <div class="mid-list">
            <button class="btn-new-task-tab">New Task</button>
            <ul>
                <li class="tab-list" id="tab-all"><a class="tab">
                    <span class="icon"></span>All Tasks</a>
                </li>
                <li class="tab-list" id="tab-upcoming">
                    <a class="tab"><span class="icon"></span>Upcoming</a>
                </li>
                <li class="tab-list" id="tab-completed">
                    <a class="tab"><span class="icon"></span>Completed</a>
                </li>
            </ul>
        </div>
        <div class="low-list">
            <h2>Projects <button class="btn-add-project" id="btn-add-project" title="Add Project">+</button></h2>
                <form action="#" class="add-project-form" id="add-project-form">
                    <div class="projectForm">
                        <label for="newProjectName" class="labelProjectForm">Project Name:</label>
                        <input type="text" id="newProjectName" class="inputProjectForm">
                    </div>
                    <div class="formProjectButtons">
                        <button type="submit" class="form-project-btn" id="submit-form-project-btn">Add Project</button>
                        <button type="button" class="form-project-btn" id="cancel-form-project-btn">Cancel</button>
                    </div>
                </form>
            <ul class="tab-projects" id="tab-projects"></ul>
        </div>
    </nav>
    <main>
        <div class="header">
            <div class="projectArea">
                <div class="projectName" id="projectName">project</div>
                <button class="btn-del-project" id="btn-del-project">Delete Project</button>
            </div>
            <div class="headerButtons">
                <button class="btn-new-task" id="btn-new-task">+ New Task</button>
                <button class="mode" id="mode">Dark mode</button>
            </div>
        </div>
        <div class="tasks" id="tasks"></div>
        <div class="footer">
            <p>Made by Roman Suslov | The Odin Project</p>
        </div>
    </main>
    <div class="addTodo-form-container" id="addTodo-form-container">
        <form action="#" id="addTodo-form">
            <div class="formT">
                <label for="formTitle" class="labelTodoForm">Title:</label>
                <input type="text" id="formTitle" class="inputTodoForm" placeholder="Study">
            </div>
            <div class="formD1">
                <label for="formDescription" class="labelTodoForm">Description:</label>
                <input type="text" id="formDescription" class="inputTodoForm" placeholder="Evening class">
            </div>
            <div class="formD2">
                <label for="formDueDate" class="labelTodoForm">Due Date:</label>
                <input type="date" id="formDueDate" class="inputTodoForm">
            </div>
            <div class="priority-box">
                <p class="priorityTitle">Choose priority:</p>
                <div class="labels">
                    <label><input type="radio" name="priority" value="high">High</label>
                    <label><input type="radio" name="priority" value="medium" checked>Medium</label>
                    <label><input type="radio" name="priority" value="low">Low</label>
                </div>
            </div>
            <div class="formButtons">
                <button type="submit" class="form-btn" id="submit-form-btn">Add Task</button>
                <button type="button" class="form-btn" id="cancel-form-btn">Cancel</button>
            </div>
        </form>
    </div>
    
</body>
</html>
