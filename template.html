<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Title</title>
</head>
<body>
    <nav class="sidebar">
        <div class="heading">
            <h1>ToDo List</h1>
        </div>
        <div class="mid-list">
            <button class="btn-new-task">New Task</button>
            <ul>
                <li class="tab-list" id="tab-all"><a class="tab">
                    <span class="icon"></span>All Tasks</a>
                </li>
                <li class="tab-list" id="tab-upcoming">
                    <a class="tab"><span class="icon"></span>Upcoming</a>
                </li>
                <li class="tab-list" id="tab-completed">
                    <a class="tab"><span class="icon"></span>Completed</a>
                </li>
            </ul>
        </div>
        <div class="low-list">
            <h2>Projects <button class="btn-add-project" id="btn-add-project" title="Add Project"></button></h2>
            <ul class="tab-projects" id="tab-projects"></ul>
        </div>
    </nav>
    <main>
    <div class="header">
    </div>
    <div class="tasks"></div>
    <div class="footer"></div>
    </main>
    
</body>
</html>
